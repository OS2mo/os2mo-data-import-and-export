stages:
  - lint
  - build
  - test
  - release

include:
  - project: labs/salt-automation
    file:
      - gitlab-ci-templates/common/docker-build-meta.v2.yml
      - gitlab-ci-templates/common/docker-release-meta.v1.yml
      - gitlab-ci-templates/python/pytest-meta.v2.yml
      - gitlab-ci-templates/common/config-updater-flux.v1.yml
      - gitlab-ci-templates/common/config-updater-salt.v1.yml
  - project: rammearkitektur/os2mo
    file:
      - gitlab-ci-templates/integration-test-meta.v1.yml

variables:
  SQL_EXPORT_RELEASE_REGISTRY_IMAGE: index.docker.io/magentaaps/os2mo-sql_export
  SQL_EXPORT_IMAGE_SHA: ${CI_REGISTRY_IMAGE}/os2mo-sql_export:${CI_COMMIT_SHA}

  PRODUCT: os2mo
  COMPONENT: sqlexport

# Build
########
Build SQL Exporter image:
  extends: .build-docker
  variables:
    CONTEXT: ${CI_PROJECT_DIR}/exporters/sql_export/
    DOCKERFILE: ${CI_PROJECT_DIR}/exporters/sql_export/Dockerfile
    CI_IMAGE: ${SQL_EXPORT_IMAGE_SHA}

# Test
######
Test SQL Exporter:
  extends: .pytest
  image: $SQL_EXPORT_IMAGE_SHA
  needs: ["Build SQL Exporter image"]
  variables:
    POETRY_VERSION: "1.3.1"
    PYPROJECT_PREFIX: exporters/sql_export/
    PYTEST_EXTRA_FLAGS: --ignore equivalence_test/equivalence_test.py
    PYTEST_ADDOPTS: "-m 'not integration_test'"


Integration-test SQL Exporter:
  extends: .integration-test:mo
  image: $SQL_EXPORT_IMAGE_SHA
  needs: ["Build SQL Exporter image"]
  services:
    - !reference [.integration-test:mo, services]
    - name: postgres:13
      alias: export-db
      # Since GitLab CI doesn't support multiple services on the same port, we
      # must run our export-db on a non-standard port to avoid colliding with MOs.
      command: ["postgres", "-c", "port=43210"]
      variables:
        POSTGRES_PASSWORD: mysecretpassword
        POSTGRES_DB: actualstate
    - name: postgres:13
      alias: export-db-historic
      # The historic (full-history) export target needs its own database so its
      # multi-row history does not leak into the actual-state assertions. Same
      # port-collision reasoning as above, hence yet another non-standard port.
      command: ["postgres", "-c", "port=43211"]
      variables:
        POSTGRES_PASSWORD: mysecretpassword
        POSTGRES_DB: historic
  parallel: 2
  variables:
    POETRY_VERSION: "1.3.1"
    PYPROJECT_PREFIX: exporters/sql_export/
    # Actual state export-db
    ACTUAL_STATE__TYPE: Postgres
    ACTUAL_STATE__HOST: export-db
    ACTUAL_STATE__PORT: 43210
    ACTUAL_STATE__DB_NAME: actualstate
    ACTUAL_STATE__USER: postgres
    ACTUAL_STATE__PASSWORD: mysecretpassword
    # Historic (full-history) export-db. Required for the historic_sync tests:
    # without it the app leaves the historic AMQP router unregistered and the
    # test fixtures cannot connect to a historic DB.
    HISTORIC_STATE__TYPE: Postgres
    HISTORIC_STATE__HOST: export-db-historic
    HISTORIC_STATE__PORT: 43211
    HISTORIC_STATE__DB_NAME: historic
    HISTORIC_STATE__USER: postgres
    HISTORIC_STATE__PASSWORD: mysecretpassword
    # GqlLoraCache settings
    # GqlLoraCache (via JobSettings) does not use the FASTRAMQPI__ prefix, so we must set these explicitly.
    # NOTE: These must be kept in sync with docker-compose.yaml
    CLIENT_ID: "dipex"
    CLIENT_SECRET: "603f1c82-d012-4d04-9382-dbe659c533fb"
    AUTH_REALM: "mo"
    AUTH_SERVER: "http://keycloak:8080/auth"


# Release
##########
Release SQL Exporter master image:
  extends: .release-master
  variables:
    CI_IMAGE: ${SQL_EXPORT_IMAGE_SHA}
    RELEASE_IMAGE: ${SQL_EXPORT_RELEASE_REGISTRY_IMAGE}

Release SQL Exporter version image:
  extends: .release-version
  variables:
    CI_IMAGE: ${SQL_EXPORT_IMAGE_SHA}
    RELEASE_IMAGE: ${SQL_EXPORT_RELEASE_REGISTRY_IMAGE}
