services:
  sql_export:
    tty: true
    stdin_open: true
    build: .
    command: ["uvicorn", "--factory", "sql_export.main:create_app", "--host", "0.0.0.0", "--reload"]
    environment:
      MORA_BASE: "http://mo:5000"
      MOX_BASE: "http://mo:5000/lora"

      LOG_LEVEL: INFO

      ACTUAL_STATE__TYPE: Postgres
      ACTUAL_STATE__HOST: export-db
      ACTUAL_STATE__DB_NAME: actualstate
      ACTUAL_STATE__USER: postgres
      ACTUAL_STATE__PASSWORD: mysecretpassword
      HISTORIC_STATE__TYPE: Postgres
      HISTORIC_STATE__HOST: export-db-historic
      HISTORIC_STATE__DB_NAME: historic
      HISTORIC_STATE__USER: postgres
      HISTORIC_STATE__PASSWORD: mysecretpassword2

      EVENTDRIVEN: "true"
      USE_NEW_CACHE: "true"
      FULL_HISTORY: "true"

      # MO
      FASTRAMQPI__AMQP__URL: "amqp://guest:guest@msg-broker"
      FASTRAMQPI__AUTH_SERVER: "http://keycloak:8080/auth"
      FASTRAMQPI__MO_URL: "http://mo:5000"
      FASTRAMQPI__CLIENT_ID: "dipex"
      FASTRAMQPI__CLIENT_SECRET: "603f1c82-d012-4d04-9382-dbe659c533fb"

      # GqlLoraCache (via JobSettings) does not use the FASTRAMQPI__ prefix, so we must set these explicitly
      # alongside the prefixed versions used by the main FastRAMQPI application.
      # NOTE: These must be kept in sync with .gitlab-ci.yml
      CLIENT_ID: "dipex"
      CLIENT_SECRET: "603f1c82-d012-4d04-9382-dbe659c533fb"
      AUTH_REALM: "mo"
      AUTH_SERVER: "http://keycloak:8080/auth"

      # Database
      FASTRAMQPI__DATABASE__USER: "fastramqpi"
      FASTRAMQPI__DATABASE__PASSWORD: "fastramqpi"
      FASTRAMQPI__DATABASE__HOST: "db"
      FASTRAMQPI__DATABASE__NAME: "fastramqpi"
    ports:
      - "127.0.0.1:8789:8000"
    volumes:
      - ./:/opt/sql_export/
    networks:
      - os2mo_default
      - sql_export

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "fastramqpi"
      POSTGRES_PASSWORD: "fastramqpi"
      POSTGRES_DB: "fastramqpi"
    networks:
      - sql_export

  export-db:
    image: postgres:13
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: actualstate
    tmpfs:
      - /var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sql_export

  export-db-historic:
    image: postgres:13
    environment:
      POSTGRES_PASSWORD: mysecretpassword2
      POSTGRES_DB: historic
    tmpfs:
      - /var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sql_export

networks:
  os2mo_default:
    external: true
  sql_export:
