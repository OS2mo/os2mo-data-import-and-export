services:
  sql_export:
    tty: true
    stdin_open: true
    build: .
    command:
      [
        "uvicorn",
        "--factory",
        "sql_export.main:create_app",
        "--host",
        "0.0.0.0",
        "--reload",
      ]
    environment:
      MORA_BASE: "http://mo:5000"
      MOX_BASE: "http://mo:5000/lora"

      LOG_LEVEL: INFO

      ACTUAL_STATE__TYPE: Postgres
      ACTUAL_STATE__HOST: export-db
      ACTUAL_STATE__DB_NAME: actualstate
      ACTUAL_STATE__USER: fastramqpi
      ACTUAL_STATE__PASSWORD: fastramqpi
      HISTORIC_STATE__TYPE: Postgres
      HISTORIC_STATE__HOST: export-db
      HISTORIC_STATE__DB_NAME: historic
      HISTORIC_STATE__USER: fastramqpi
      HISTORIC_STATE__PASSWORD: fastramqpi

      EVENTDRIVEN: "true"
      USE_NEW_CACHE: "true"
      FULL_HISTORY: "true"

      # MO
      FASTRAMQPI__AMQP__URL: "amqp://guest:guest@msg-broker"
      FASTRAMQPI__AUTH_SERVER: "http://keycloak:8080/auth"
      FASTRAMQPI__MO_URL: "http://mo:5000"
      FASTRAMQPI__CLIENT_ID: "dipex"
      FASTRAMQPI__CLIENT_SECRET: "603f1c82-d012-4d04-9382-dbe659c533fb"

      # GqlLoraCache settings
      # GqlLoraCache (via JobSettings) does not use the FASTRAMQPI__ prefix, so we must set these explicitly.
      AUTH_SERVER: "http://keycloak:8080/auth"
      AUTH_REALM: "mo"
      CLIENT_ID: "dipex"
      CLIENT_SECRET: "603f1c82-d012-4d04-9382-dbe659c533fb"

      # Database
      FASTRAMQPI__DATABASE__USER: "fastramqpi"
      FASTRAMQPI__DATABASE__PASSWORD: "fastramqpi"
      FASTRAMQPI__DATABASE__HOST: "export-db"
      FASTRAMQPI__DATABASE__NAME: "fastramqpi"
    ports:
      - "127.0.0.1:8789:8000"
    volumes:
      - ./:/opt/sql_export/
    networks:
      - os2mo_default
      - sql_export
    depends_on:
      export-db:
        condition: service_healthy

  export-db:
    image: postgres:16
    environment:
      POSTGRES_USER: "fastramqpi"
      POSTGRES_PASSWORD: "fastramqpi"
      POSTGRES_DB: "fastramqpi"
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - os2mo_default
      - sql_export
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

networks:
  os2mo_default:
    external: true
  sql_export:
